name: Build Android APK Fast

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev
        pip3 install --user --upgrade buildozer Cython virtualenv

    - name: Optimize buildozer.spec for Pure Mobile
      run: |
        if [ -f buildozer.spec ]; then
          # Emülatör kalıntılarını silip sadece telefon mimarisini (arm64-v8a) bırakıyoruz
          sed -i 's/^android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          
          # Telefonlarda çökmeyi önleyen tam ekran (fullscreen) ayarını aktifleştiriyoruz
          sed -i 's/^fullscreen =.*/fullscreen = 1/' buildozer.spec
          
          # Eğer oyun yatay ise yönü kilitle (çökmeyi önler)
          sed -i 's/^orientation =.*/orientation = landscape/' buildozer.spec
        fi

    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Haxball-Mobile-Only-APK
        path: bin/*.apk
